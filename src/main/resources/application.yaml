server:
  port: 8081

spring:
  datasource:
    url: "jdbc:mysql://192.168.72.128:3306/book_talk?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${MYSQL_PASSWORD}

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  servlet:
    encoding:
      charset: UTF-8
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

  redis:
    host: 192.168.72.128
    port: 6379
    password: ${REDIS_PASSWORD}   # 如果没有密码，这行可以删除或者留空
    database: 6

  rabbitmq:
    host: 192.168.72.128
    port: 5672
    username: bookTalk
    password: bookTalk
    virtual-host: /bookTalk
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
  aop:
    auto: true

  elasticsearch:
    uris: 192.168.72.128:9200
    connection-timeout: 1s
    socket-timeout: 30s

redisson:
  config: classpath:redisson.yml
  address: redis://${spring.redis.host}:${spring.redis.port}
  password: ${spring.redis.password:}
  database: 6
  idleConnectionTimeout: 10000
  connectTimeout: 10000
  timeout: 3000
  retryAttempts: 3
  retryInterval: 1500

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cc.booktalk
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

aliyun:
  oss:
    endpoint: ${ALIYUN_ENDPOINT}
    access-key-id: ${ALIYUN_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET}
    bucket-name: ${ALIYUN_BUCKET_NAME}

logging:
  level:
    root: info
    com.cc.booktalk: debug
    org.springframework: warn
    org.mybatis: warn
    com.baomidou: warn
    org.springframework.amqp: info
    com.rabbitmq: warn

    org.apache.tomcat.websocket: debug
    javax.websocket: debug

xxl:
  job:
    enabled: false
    admin:
      addresses: http://localhost:8089/xxl-job-admin
    accessToken: ""
    executor:
      # 执行器的应用名称
      appname: book-talk
      # 执行器注册 [选填]：优先使用该配置作为注册地址
      address: ""
      # 执行器IP [选填]：默认为空表示自动获取IP
      ip: ""
      # 执行器端口号 [选填]：小于等于0则自动获取；默认端口为9999
      port: 9999
      # 执行器运行日志文件存储磁盘路径 [选填] ：需要对该路径拥有读写权限；为空则使用默认路径；
      logpath:
      #logpath: /data/logs/mls/job
      # 执行器日志文件保存天数 [选填] ： 过期日志自动清理, 限制值大于等于3时生效; 否则, 如-1, 关闭自动清理功能；
      logretentiondays: 7



